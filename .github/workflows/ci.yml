name: CI

on:
  push:
  pull_request:

jobs:
  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mal_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d mal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mal_test
      JWT_SECRET: ci-only-secret-value-that-is-at-least-32-characters
      UPLOAD_DIR: /tmp/mal-test-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - working-directory: backend
        run: python -m compileall -q app migrations tests
      - working-directory: backend
        run: ruff check app migrations tests
      - working-directory: backend
        run: ruff format --check app migrations tests
      - working-directory: backend
        run: alembic upgrade head
      - working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci --no-audit --no-fund
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm test
      - working-directory: frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r backend/requirements.txt
      - working-directory: frontend
        run: npm ci --no-audit --no-fund
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      - working-directory: frontend
        run: npm run test:e2e

